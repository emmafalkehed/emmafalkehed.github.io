<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Emma Falkehed</title>
    <meta
      name="description"
      content="Emma Falkehed"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="gallery-overrides.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header is-hidden" id="site-header">
        <h1>EMMA FALKEHED</h1>
        <nav class="category-nav" id="category-nav" aria-label="Site navigation"></nav>
      </header>

      <main class="content">
        <section class="gallery-view" id="gallery-view" aria-live="polite">
          <div class="unlock-panel" id="unlock-panel">
            <form class="unlock-form" id="unlock-form">
              <h1 class="unlock-name">Emma Falkehed</h1>
              <div class="unlock-row">
                <input
                  class="unlock-input"
                  id="review-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  maxlength="256"
                  placeholder="Password"
                  required
                />
                <button class="unlock-button" id="unlock-button" type="submit">
                  Enter
                </button>
              </div>
              <p class="unlock-status" id="unlock-status" role="status" aria-live="polite"></p>
            </form>
          </div>

          <div class="loading-panel is-hidden" id="loading-panel" aria-live="polite">
            <div class="unlock-form loading-shell">
              <h1 class="unlock-name">Emma Falkehed</h1>
              <p class="loading-title" id="loading-title">Verifying access</p>
              <p class="loading-detail" id="loading-detail">Requesting secure download links.</p>
              <div class="loading-progress-bar is-indeterminate" id="loading-progress-bar">
                <span class="loading-progress-fill" id="loading-progress-fill"></span>
              </div>
              <p class="loading-progress-text" id="loading-progress-text">Loading details</p>
            </div>
          </div>

          <div class="gallery-track is-hidden" id="gallery-track"></div>
        </section>

        <section class="cv-view is-hidden" id="cv-view"></section>
      </main>
    </div>

    <aside class="copyright-badge is-hidden" id="copyright-badge">
      PROJECTS DEVELOPPED<br />
      FOR GILLES &amp; BOISSIER
    </aside>

    <dialog class="lightbox" id="lightbox" aria-label="Expanded image">
      <div class="lightbox-surface">
        <button class="lightbox-close" id="lightbox-close" type="button" aria-label="Close image">
          close
        </button>

        <figure class="lightbox-figure" id="lightbox-figure">
          <div class="lightbox-stage" id="lightbox-stage">
            <img id="lightbox-image" alt="" />
          </div>
          <figcaption class="lightbox-caption">
            <p class="lightbox-title" id="lightbox-title"></p>
            <p class="lightbox-meta" id="lightbox-meta"></p>
          </figcaption>
        </figure>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
